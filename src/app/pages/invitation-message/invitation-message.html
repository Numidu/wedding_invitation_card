<section
  id="invitation"
  class="min-h-screen flex items-center justify-center px-6 relative overflow-hidden"
  style="background:#FAF7F2;">

  <!-- Google Fonts (add once in <head> if not already there) -->
  <!-- <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet"> -->

  <!-- Corner ornaments -->
  <svg class="absolute top-5 left-5 w-20 h-20 opacity-30" viewBox="0 0 80 80" fill="none">
    <path d="M2 78 L2 2 L78 2" stroke="#c9a96e" stroke-width="0.8"/>
    <path d="M10 78 L10 10 L78 10" stroke="#c9a96e" stroke-width="0.4" stroke-dasharray="2 3"/>
    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>
    <path d="M18 2 Q18 18 2 18" stroke="#c9a96e" stroke-width="0.5"/>
  </svg>
  <svg class="absolute top-5 right-5 w-20 h-20 opacity-30 scale-x-[-1]" viewBox="0 0 80 80" fill="none">
    <path d="M2 78 L2 2 L78 2" stroke="#c9a96e" stroke-width="0.8"/>
    <path d="M10 78 L10 10 L78 10" stroke="#c9a96e" stroke-width="0.4" stroke-dasharray="2 3"/>
    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>
    <path d="M18 2 Q18 18 2 18" stroke="#c9a96e" stroke-width="0.5"/>
  </svg>
  <svg class="absolute bottom-5 left-5 w-20 h-20 opacity-30 scale-y-[-1]" viewBox="0 0 80 80" fill="none">
    <path d="M2 78 L2 2 L78 2" stroke="#c9a96e" stroke-width="0.8"/>
    <path d="M10 78 L10 10 L78 10" stroke="#c9a96e" stroke-width="0.4" stroke-dasharray="2 3"/>
    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>
    <path d="M18 2 Q18 18 2 18" stroke="#c9a96e" stroke-width="0.5"/>
  </svg>
  <svg class="absolute bottom-5 right-5 w-20 h-20 opacity-30" style="transform:scale(-1,-1);" viewBox="0 0 80 80" fill="none">
    <path d="M2 78 L2 2 L78 2" stroke="#c9a96e" stroke-width="0.8"/>
    <path d="M10 78 L10 10 L78 10" stroke="#c9a96e" stroke-width="0.4" stroke-dasharray="2 3"/>
    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>
    <path d="M18 2 Q18 18 2 18" stroke="#c9a96e" stroke-width="0.5"/>
  </svg>

  <!-- Content -->
  <div class="max-w-xl text-center relative z-10 py-20">

    <!-- Eyebrow -->
    <p style="font-family:'Jost',sans-serif; font-weight:200; font-size:10px; letter-spacing:0.55em; text-transform:uppercase; color:#c9a96e; margin-bottom:2rem;">
      Wedding Invitation
    </p>

    <!-- Diamond ornament -->
    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:2rem;">
      <span style="width:52px; height:0.5px; background:#c9a96e; opacity:0.6;"></span>
      <span style="width:3px; height:3px; background:#c9a96e; transform:rotate(45deg); opacity:0.5;"></span>
      <span style="width:5px; height:5px; background:#c9a96e; transform:rotate(45deg);"></span>
      <span style="width:3px; height:3px; background:#c9a96e; transform:rotate(45deg); opacity:0.5;"></span>
      <span style="width:52px; height:0.5px; background:#c9a96e; opacity:0.6;"></span>
    </div>

    <!-- Heading -->
    <h2 style="font-family:'Cormorant Garamond',Georgia,serif; font-weight:300; font-style:italic; font-size:clamp(2rem,5vw,3rem); color:#2c2418; line-height:1.2; margin-bottom:2rem;">
      Together with their families
    </h2>

    <!-- Rule with star -->
    <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2rem;">
      <span style="width:40px; height:0.5px; background:#c9a96e; opacity:0.4;"></span>
      <span style="color:#c9a96e; font-size:12px;">✦</span>
      <span style="width:40px; height:0.5px; background:#c9a96e; opacity:0.4;"></span>
    </div>

    <!-- Body text -->
    <p style="font-family:'Cormorant Garamond',Georgia,serif; font-size:1.15rem; line-height:1.95; color:#5a4e3a; letter-spacing:0.01em;">
      We invite you to celebrate the joy of our wedding<br>
      and share in the beginning of our new journey together.
    </p>

  </div>

</section>
