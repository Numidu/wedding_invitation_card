<section class="rsvp-section">
  <div class="rsvp-shell">
    <p class="eyebrow">RSVP</p>
    <h2>Will You <em>Attend?</em></h2>
    <div class="divider"></div>

    <div class="rsvp-card">
      <form #rsvpForm="ngForm" (ngSubmit)="submitRsvp()" class="rsvp-form">
        <label>
          <span>Full Name</span>
          <input
            type="text"
            name="name"
            [(ngModel)]="guest.name"
            placeholder="Enter your name"
            required>
        </label>

        <label>
          <span>Attendance</span>
          <select name="attendance" [(ngModel)]="guest.attendance">
            <option value="yes">Yes, I will attend</option>
            <option value="no">Sorry, I can't attend</option>
          </select>
        </label>

        <div class="field-grid">
          <label>
            <span>Guests</span>
            <input
              type="number"
              name="guests"
              min="1"
              max="10"
              [(ngModel)]="guest.guests"
              required>
          </label>

          <label>
            <span>Meal</span>
            <select name="meal" [(ngModel)]="guest.meal">
              <option>No preference</option>
              <option>Vegetarian</option>
              <option>Non-vegetarian</option>
            </select>
          </label>
        </div>

        <label>
          <span>Message <small>(Optional)</small></span>
          <textarea
            name="message"
            [(ngModel)]="guest.message"
            placeholder="Leave a warm wish for the couple..."
            rows="3"></textarea>
        </label>

        <button type="submit" [disabled]="rsvpForm.invalid">
          Send RSVP on WhatsApp
        </button>

        @if (submitted()) {
          <p class="success-note">
            Thank you. Your RSVP message is ready to send in WhatsApp.
          </p>
        }
      </form>
    </div>

    <p class="ornament">* * *</p>
  </div>
</section>
