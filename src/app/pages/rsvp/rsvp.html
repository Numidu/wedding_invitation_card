<section class="bg-white py-24 px-6">

  <div class="max-w-xl mx-auto text-center">

    <p class="uppercase tracking-[0.4em] text-gray-500 text-sm mb-4">
      RSVP
    </p>

    <h2 class="text-4xl md:text-5xl font-light mb-10">
      Will You Attend?
    </h2>

    <form class="space-y-6">

      <input
        type="text"
        placeholder="Your Name"
        class="w-full border rounded-xl p-4">

      <select
        class="w-full border rounded-xl p-4">

        <option>Yes, I will attend</option>
        <option>Sorry, I can't attend</option>

      </select>

      <input
        type="number"
        placeholder="Number of Guests"
        class="w-full border rounded-xl p-4">

      <button
        type="submit"
        class="px-8 py-3 bg-black text-white rounded-full">

        Submit RSVP

      </button>

    </form>

  </div>

</section>
