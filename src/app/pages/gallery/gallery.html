<section class="bg-white py-24 px-6">

  <div class="max-w-6xl mx-auto">

    <div class="text-center mb-16">

      <p class="uppercase tracking-[0.4em] text-gray-500 text-sm mb-4">
        Memories
      </p>

      <h2 class="text-4xl md:text-5xl font-light mb-3">
        Gallery
      </h2>

      <div class="w-16 h-px bg-gray-300 mx-auto"></div>

    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-5">

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery1.jfif')">
        <img
          src="image/gallery1.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery2.jfif')">
        <img
          src="image/gallery2.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery3.jfif')">
        <img
          src="image/gallery3.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery4.jfif')">
        <img
          src="image/gallery4.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery5.jfif')">
        <img
          src="image/gallery5.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

      <div
        class="group relative overflow-hidden rounded-3xl shadow-md cursor-pointer"
        (click)="openImage('image/gallery6.jfif')">
        <img
          src="image/gallery6.jfif"
          alt=""
          class="w-full h-72 object-cover transition duration-500 group-hover:scale-110 group-hover:brightness-90">
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 rounded-3xl"></div>
      </div>

    </div>

  </div>

  @if(selectedImage()) {

    <div
      class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 backdrop-blur-sm"
      (click)="closeImage()">

      <div class="relative">
        <img
          [src]="selectedImage()"
          class="max-w-[90vw] max-h-[90vh] rounded-3xl shadow-2xl"
          (click)="$event.stopPropagation()">
        <button
          class="absolute -top-4 -right-4 w-10 h-10 bg-white/20 hover:bg-white/30 text-white rounded-full flex items-center justify-center transition text-xl"
          (click)="closeImage(); $event.stopPropagation()">
          ✕
        </button>
      </div>

    </div>

  }

</section>
