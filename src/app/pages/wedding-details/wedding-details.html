<section style="background:#FAF7F2;padding:6rem 1.5rem;">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

  <div style="max-width:900px;margin:0 auto;text-align:center;">

    <!-- Header -->
    <p style="font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:0.45em;color:#c9a96e;text-transform:uppercase;margin-bottom:1rem;">
      The Wedding
    </p>

    <h2 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:3rem;color:#3a2e28;letter-spacing:0.05em;margin:0 0 0.5rem;">
      Event <em style="font-style:italic;color:#c9a96e;">Details</em>
    </h2>

    <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9a96e,transparent);margin:1.25rem auto 3.5rem;"></div>

    <!-- Cards Grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;">

      <!-- Date -->
      <div style="background:#fff;border:0.5px solid rgba(201,169,110,0.3);border-radius:16px;padding:2.5rem 1.5rem;box-shadow:0 4px 32px rgba(201,169,110,0.07);transition:transform 0.2s;"
        onmouseover="this.style.transform='translateY(-4px)';"
        onmouseout="this.style.transform='translateY(0)';">

        <div style="width:52px;height:52px;border-radius:50%;background:rgba(201,169,110,0.1);border:0.5px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>

        <p style="font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:0.3em;color:#c9a96e;text-transform:uppercase;margin:0 0 0.75rem;">
          Date
        </p>

        <h3 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;color:#3a2e28;margin:0 0 0.5rem;letter-spacing:0.03em;">
          15 December
        </h3>

        <p style="font-family:'Raleway',sans-serif;font-size:13px;color:#a0917e;font-style:italic;margin:0;">
          2026
        </p>

      </div>

      <!-- Time -->
      <div style="background:#fff;border:0.5px solid rgba(201,169,110,0.3);border-radius:16px;padding:2.5rem 1.5rem;box-shadow:0 4px 32px rgba(201,169,110,0.07);transition:transform 0.2s;"
        onmouseover="this.style.transform='translateY(-4px)';"
        onmouseout="this.style.transform='translateY(0)';">

        <div style="width:52px;height:52px;border-radius:50%;background:rgba(201,169,110,0.1);border:0.5px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15 15"/>
          </svg>
        </div>

        <p style="font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:0.3em;color:#c9a96e;text-transform:uppercase;margin:0 0 0.75rem;">
          Time
        </p>

        <h3 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;color:#3a2e28;margin:0 0 0.5rem;letter-spacing:0.03em;">
          10:00 AM
        </h3>

        <p style="font-family:'Raleway',sans-serif;font-size:13px;color:#a0917e;font-style:italic;margin:0;">
          Ceremony begins promptly
        </p>

      </div>

      <!-- Venue -->
      <div style="background:#fff;border:0.5px solid rgba(201,169,110,0.3);border-radius:16px;padding:2.5rem 1.5rem;box-shadow:0 4px 32px rgba(201,169,110,0.07);transition:transform 0.2s;"
        onmouseover="this.style.transform='translateY(-4px)';"
        onmouseout="this.style.transform='translateY(0)';">

        <div style="width:52px;height:52px;border-radius:50%;background:rgba(201,169,110,0.1);border:0.5px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </div>

        <p style="font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:0.3em;color:#c9a96e;text-transform:uppercase;margin:0 0 0.75rem;">
          Venue
        </p>

        <h3 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.6rem;color:#3a2e28;margin:0 0 0.5rem;letter-spacing:0.03em;">
          Shangri-La
        </h3>

        <p style="font-family:'Raleway',sans-serif;font-size:13px;color:#a0917e;font-style:italic;margin:0;">
          Colombo, Sri Lanka
        </p>

      </div>

    </div>

    <!-- Divider -->
    <div style="width:100%;height:0.5px;background:linear-gradient(90deg,transparent,rgba(201,169,110,0.4),transparent);margin:3.5rem 0;"></div>

    <!-- Add to Calendar / Get Directions buttons -->
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">

      <a href="#" style="font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#3a2e28;border:0.5px solid rgba(58,46,40,0.4);border-radius:50px;padding:0.75rem 1.75rem;text-decoration:none;transition:all 0.2s;display:inline-block;"
        onmouseover="this.style.background='#3a2e28';this.style.color='#f5ede0';"
        onmouseout="this.style.background='transparent';this.style.color='#3a2e28';">
        Add to Calendar
      </a>

      <a href="https://maps.google.com/?q=Shangri-La+Colombo" target="_blank" style="font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#fff;background:#c9a96e;border:0.5px solid #c9a96e;border-radius:50px;padding:0.75rem 1.75rem;text-decoration:none;transition:all 0.2s;display:inline-block;"
        onmouseover="this.style.background='#b8944f';this.style.borderColor='#b8944f';"
        onmouseout="this.style.background='#c9a96e';this.style.borderColor='#c9a96e';">
        Get Directions
      </a>

    </div>

    <!-- Footer ornament -->
    <p style="font-family:'Cormorant Garamond',serif;color:#c9a96e;font-size:1.2rem;opacity:0.6;margin:3rem 0 0;letter-spacing:0.5em;">
      ✦ &nbsp; ✦ &nbsp; ✦
    </p>

  </div>

</section>
