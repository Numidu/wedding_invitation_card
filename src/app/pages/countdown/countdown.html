<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel+Decorative:wght@400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F0;
    --parchment: #F2EBD9;
    --gold: #C9A96E;
    --gold-light: #E8D5A3;
    --gold-dark: #A07840;
    --rose: #C4847A;
    --text-dark: #3A2E26;
    --text-mid: #7A6855;
    --text-light: #A89880;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .card-wrapper {
    position: relative;
    z-index: 1;
    width: min(720px, 96vw);
    padding: 20px;
  }

  .outer-frame {
    position: relative;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark), var(--gold-light), var(--gold-dark));
    border-radius: 2px;
  }

  .inner-frame {
    position: relative;
    background: var(--cream);
    padding: 56px 52px 52px;
    overflow: hidden;
  }

  .corner {
    position: absolute;
    width: 70px;
    height: 70px;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 12px; left: 12px; }
  .corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .corner-br { bottom: 12px; right: 12px; transform: scale(-1); }

  .floral-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.045;
    pointer-events: none;
  }
  .floral-bg svg { width: 55%; height: 55%; }

  .content {
    position: relative;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.6rem;
    letter-spacing: 0.45em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 16px auto;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.35s;
  }
  .divider-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .date-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 300;
    color: var(--text-dark);
    letter-spacing: 0.04em;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.5s;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--text-mid);
    margin-top: 14px;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.65s;
  }
  .subtitle em {
    font-style: italic;
    color: var(--rose);
  }

  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 44px;
    border: 1px solid var(--gold-light);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
  }

  .time-block {
    position: relative;
    padding: 28px 12px 24px;
    border-right: 1px solid var(--gold-light);
    background: linear-gradient(180deg, rgba(201,169,110,0.04) 0%, transparent 100%);
    transition: background 0.3s;
  }
  .time-block:last-child { border-right: none; }
  .time-block:hover {
    background: linear-gradient(180deg, rgba(201,169,110,0.1) 0%, transparent 100%);
  }

  .time-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 8vw, 4.8rem);
    font-weight: 300;
    color: var(--text-dark);
    line-height: 1;
    display: block;
  }
  .time-number.tick {
    animation: numTick 0.2s ease;
  }

  .time-label {
    display: block;
    margin-top: 10px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: var(--gold-dark);
    text-transform: uppercase;
  }

  .time-block::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.6;
  }

  .names-row {
    margin-top: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1s;
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 300;
    color: var(--text-mid);
    letter-spacing: 0.05em;
  }
  .ampersand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--gold);
    line-height: 1;
  }

  .footer-text {
    margin-top: 18px;
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--text-light);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes numTick {
    0%   { transform: translateY(0); opacity: 1; }
    40%  { transform: translateY(-6px); opacity: 0.4; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @media (max-width: 480px) {
    .inner-frame { padding: 40px 24px 36px; }
    .corner { width: 48px; height: 48px; }
    .divider-line { width: 48px; }
    .countdown-grid { margin-top: 32px; }
    .time-block { padding: 20px 8px 18px; }
    .names-row { gap: 12px; }
  }
</style>
</head>
<body>

<div class="card-wrapper">
  <div class="outer-frame">
    <div class="inner-frame">

      <!-- Corner ornaments -->
      <div class="corner corner-tl">
        <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 5 L5 30" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L30 5" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L22 22" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
          <circle cx="5" cy="5" r="2.5" fill="#C9A96E"/>
          <circle cx="5" cy="30" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <circle cx="30" cy="5" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <path d="M16 16 Q22 10 28 14 Q22 20 16 16Z" fill="#C9A96E" opacity="0.35"/>
          <path d="M16 16 L22 13" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-tr">
        <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 5 L5 30" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L30 5" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L22 22" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
          <circle cx="5" cy="5" r="2.5" fill="#C9A96E"/>
          <circle cx="5" cy="30" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <circle cx="30" cy="5" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <path d="M16 16 Q22 10 28 14 Q22 20 16 16Z" fill="#C9A96E" opacity="0.35"/>
          <path d="M16 16 L22 13" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-bl">
        <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 5 L5 30" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L30 5" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L22 22" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
          <circle cx="5" cy="5" r="2.5" fill="#C9A96E"/>
          <circle cx="5" cy="30" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <circle cx="30" cy="5" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <path d="M16 16 Q22 10 28 14 Q22 20 16 16Z" fill="#C9A96E" opacity="0.35"/>
          <path d="M16 16 L22 13" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-br">
        <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 5 L5 30" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L30 5" stroke="#C9A96E" stroke-width="1"/>
          <path d="M5 5 L22 22" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
          <circle cx="5" cy="5" r="2.5" fill="#C9A96E"/>
          <circle cx="5" cy="30" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <circle cx="30" cy="5" r="1.5" fill="#C9A96E" opacity="0.5"/>
          <path d="M16 16 Q22 10 28 14 Q22 20 16 16Z" fill="#C9A96E" opacity="0.35"/>
          <path d="M16 16 L22 13" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
        </svg>
      </div>

      <!-- Floral watermark -->
      <div class="floral-bg">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="#C9A96E">
          <g transform="translate(100,100)">
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(0)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(45)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(90)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(135)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(180)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(225)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(270)" opacity="0.8"/>
            <ellipse cx="0" cy="-38" rx="14" ry="30" transform="rotate(315)" opacity="0.8"/>
            <circle cx="0" cy="0" r="16"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(22.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(67.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(112.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(157.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(202.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(247.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(292.5)" opacity="0.6"/>
            <ellipse cx="0" cy="-20" rx="8" ry="16" transform="rotate(337.5)" opacity="0.6"/>
          </g>
          <path d="M60 100 Q40 70 60 55 Q62 80 60 100Z" opacity="0.5"/>
          <path d="M140 100 Q160 70 140 55 Q138 80 140 100Z" opacity="0.5"/>
          <path d="M100 145 Q70 160 65 140 Q88 138 100 145Z" opacity="0.5"/>
          <path d="M100 145 Q130 160 135 140 Q112 138 100 145Z" opacity="0.5"/>
        </svg>
      </div>

      <!-- Content -->
      <div class="content">
        <p class="eyebrow">Save The Date</p>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-diamond"></div>
          <div class="divider-line"></div>
        </div>

        <h2 class="date-heading">December 15, 2026</h2>

        <p class="subtitle">
          Counting down to the day we say <em>"I Do"</em>
        </p>

        <div class="countdown-grid">
          <div class="time-block">
            <span class="time-number" id="days">000</span>
            <span class="time-label">Days</span>
          </div>
          <div class="time-block">
            <span class="time-number" id="hours">00</span>
            <span class="time-label">Hours</span>
          </div>
          <div class="time-block">
            <span class="time-number" id="minutes">00</span>
            <span class="time-label">Minutes</span>
          </div>
          <div class="time-block">
            <span class="time-number" id="seconds">00</span>
            <span class="time-label">Seconds</span>
          </div>
        </div>

        <div class="names-row">
          <span class="name">Amara</span>
          <span class="ampersand">&</span>
          <span class="name">Sebastian</span>
        </div>

        <p class="footer-text">Together with their families</p>
      </div>

    </div>
  </div>
</div>

<script>
  const target = new Date('December 15, 2026 00:00:00');

  function pad(n, len = 2) {
    return String(n).padStart(len, '0');
  }

  function tick(el, newVal) {
    if (el.textContent !== newVal) {
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
      el.textContent = newVal;
    }
  }

  function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '000';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      return;
    }

    const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    tick(document.getElementById('days'),    pad(days, 3));
    tick(document.getElementById('hours'),   pad(hours));
    tick(document.getElementById('minutes'), pad(minutes));
    tick(document.getElementById('seconds'), pad(seconds));
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
